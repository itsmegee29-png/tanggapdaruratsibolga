<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Maintenance</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #111;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      text-align: center;
    }
    .container {
      max-width: 500px;
    }
    h1 {
      font-size: 2.5rem;
      margin-bottom: 10px;
    }
    p {
      opacity: 0.8;
    }
    #countdown {
      margin-top: 20px;
      font-size: 1.5rem;
      color: #00ffcc;
    }
  </style>
</head>
<body>

<div class="container">
  <h1>🚧 Website Sedang Maintenance</h1>
  <p>Kami sedang melakukan perbaikan. Silakan kembali lagi nanti.</p>
  <div id="countdown"></div>
</div>

<script>
  // Waktu selesai maintenance (ubah sesuai kebutuhan)
  const endTime = new Date();
  endTime.setMinutes(endTime.getMinutes() + 30);

  function updateCountdown() {
    const now = new Date();
    const diff = endTime - now;

    if (diff <= 0) {
      document.getElementById("countdown").innerHTML = "Maintenance selesai!";
      return;
    }

    const minutes = Math.floor(diff / 1000 / 60);
    const seconds = Math.floor((diff / 1000) % 60);

    document.getElementById("countdown").innerHTML =
      `Perkiraan selesai dalam ${minutes} menit ${seconds} detik`;
  }

  setInterval(updateCountdown, 1000);
</script>

</body>
</html>
